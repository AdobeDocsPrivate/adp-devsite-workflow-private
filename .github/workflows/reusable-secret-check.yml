---
name: Reusable Secret Check
on:
  workflow_call:
    secrets:
      POC_SECRET:
        required: false

jobs:
  check-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Report secret presence
        run: |
          if [ -n "${{ secrets.POC_SECRET }}" ]; then
            echo "POC_SECRET is available"
          else
            echo "POC_SECRET is NOT available"
          fi
